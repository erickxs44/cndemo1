<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#ffffff"/>
  <!-- Reserva text -->
  <text
    x="240"
    y="320"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="90"
    font-weight="700"
    letter-spacing="-2"
    fill="#1a1a1a"
    text-anchor="middle"
    dominant-baseline="middle"
  >reserva</text>
  <!-- Red hoopoe bird (simplified) -->
  <g transform="translate(418, 248) scale(0.7)">
    <!-- Body -->
    <ellipse cx="30" cy="55" rx="22" ry="16" fill="#cc0000" transform="rotate(-20, 30, 55)"/>
    <!-- Tail -->
    <polygon points="52,62 80,58 75,70" fill="#cc0000"/>
    <!-- Head -->
    <circle cx="12" cy="38" r="15" fill="#cc0000"/>
    <!-- Beak -->
    <line x1="0" y1="36" x2="-14" y2="38" stroke="#cc0000" stroke-width="4" stroke-linecap="round"/>
    <!-- Crest feathers -->
    <line x1="14" y1="24" x2="8" y2="4" stroke="#cc0000" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="22" x2="18" y2="2" stroke="#cc0000" stroke-width="5" stroke-linecap="round"/>
    <line x1="25" y1="24" x2="28" y2="4" stroke="#cc0000" stroke-width="5" stroke-linecap="round"/>
    <!-- Crest tips -->
    <circle cx="8" cy="4" r="5" fill="#cc0000"/>
    <circle cx="18" cy="2" r="5" fill="#cc0000"/>
    <circle cx="28" cy="4" r="5" fill="#cc0000"/>
    <!-- Legs -->
    <line x1="22" y1="70" x2="18" y2="88" stroke="#cc0000" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="35" y1="72" x2="34" y2="90" stroke="#cc0000" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Feet -->
    <line x1="18" y1="88" x2="8" y2="94" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="88" x2="22" y2="95" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
    <line x1="34" y1="90" x2="24" y2="96" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
    <line x1="34" y1="90" x2="38" y2="97" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
