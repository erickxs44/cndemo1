<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#ffffff"/>
  <!-- Red bar element on the A -->
  <line x1="58" y1="310" x2="118" y2="310" stroke="#cc0000" stroke-width="14" stroke-linecap="round"/>
  <!-- ARAMIS text - thin modern font approximation via paths -->
  <text
    x="300"
    y="330"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="100"
    font-weight="200"
    letter-spacing="12"
    fill="#1a1a1a"
    text-anchor="middle"
    dominant-baseline="middle"
  >ARAMIS</text>
  <!-- Red diagonal bar across the A leg -->
  <line x1="46" y1="318" x2="108" y2="318" stroke="#cc0000" stroke-width="11" stroke-linecap="square"/>
</svg>
